openapi: 3.0.3
info:
  title: List Model Integration Test
  version: 1.0.0

paths:
  /labels:
    post:
      tags: [Labels]
      summary: Create a label collection
      operationId: createLabelCollection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LabelCollection'
      responses:
        "201":
          description: Created

components:
  schemas:
    LabelCollection:
      type: object
      required:
        - labels
      properties:
        labels:
          type: array
          minItems: 1
          maxItems: 5
          items:
            type: string
