name: Integration Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: wrapper/pnpm-lock.yaml

      - name: Install dependencies
        run: make install

      - name: Cache OpenAPI Generator
        uses: actions/cache@v4
        with:
          path: wrapper/node_modules/@openapitools/openapi-generator-cli/versions
          key: ${{ runner.os }}-openapi-generator-${{ hashFiles('wrapper/openapitools.json') }}
          restore-keys: |
            ${{ runner.os }}-openapi-generator-

      - name: Run integration tests
        run: make test-integration
