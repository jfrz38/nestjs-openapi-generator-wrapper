name: Build and run tests
on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v6
          - uses: pnpm/action-setup@v6.0.3
            with:
              version: 10
          - uses: actions/setup-node@v6
            with:
              node-version: '20.x'
              cache: 'pnpm'
              cache-dependency-path: wrapper/pnpm-lock.yaml
              
          - name: Install dependencies
            run: make install
          
          - name: Run tests
            run: make test
